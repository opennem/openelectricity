name: Regenerate facility OG cards

# OG cards are committed under static/og/facility and served as static assets,
# so the deploy build no longer generates them (it was blowing the build time
# limit). This job refreshes them out-of-band and commits any that changed.
#
# Runs are incremental: the generator diffs each card against the committed
# facility-card-state.json (photo added/changed in Sanity, facility data
# changed, template version bumped) and only re-renders what moved. Dispatch
# with force=true for a full re-render (recovery, or after a renderer change
# without an OG_CARD_VERSION bump).
#
# Requires one repo secret: DOPPLER_TOKEN — a read-only Doppler service token
# for the openelectricity/dev config (where the PUBLIC_OE_API_* and
# PUBLIC_SANITY_* values live); `doppler run` injects them at runtime. The push
# to main needs github-actions to be allowed past branch protection (or swap
# GITHUB_TOKEN for a PAT / convert this to a pull request).

on:
  schedule:
    - cron: '0 3 * * 0' # weekly, Sundays at 03:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-render all cards (ignore the state diff)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Regenerate OG cards
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            doppler run -- pnpm build:og:force
          else
            doppler run -- pnpm build:og
          fi

      - name: Commit changed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/og/facility src/lib/server/og/facility-card-codes.json src/lib/server/og/facility-card-state.json
          if git diff --staged --quiet; then
            echo "No OG card changes."
          else
            git commit -m "Regenerate facility OG cards"
            # main may have moved during the render — replay our commit on top
            git pull --rebase origin main
            git push
          fi
